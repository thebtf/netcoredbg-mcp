name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      target:
        description: 'Publish target'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    outputs:
      release_created: ${{ steps.create_release.outputs.id != '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create Release with auto-generated notes
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}

  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  test:
    name: Test package
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download build artifact archive
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: artifact-download/
          skip-decompress: true

      - name: Extract build artifacts
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          mapfile -t archives < <(find artifact-download -type f -print)
          if [ "${#archives[@]}" -ne 1 ]; then
            echo "Expected exactly one downloaded artifact archive, found ${#archives[@]}" >&2
            find artifact-download -maxdepth 2 -type f -print >&2
            exit 1
          fi
          unzip -q "${archives[0]}" -d dist

      - name: Install package from wheel
        run: pip install dist/*.whl

      - name: Verify installation
        run: |
          python -c "from netcoredbg_mcp import server; print('Import OK')"
          netcoredbg-mcp --help

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifact archive
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: artifact-download/
          skip-decompress: true

      - name: Extract build artifacts
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          mapfile -t archives < <(find artifact-download -type f -print)
          if [ "${#archives[@]}" -ne 1 ]; then
            echo "Expected exactly one downloaded artifact archive, found ${#archives[@]}" >&2
            find artifact-download -maxdepth 2 -type f -print >&2
            exit 1
          fi
          unzip -q "${archives[0]}" -d dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifact archive
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: artifact-download/
          skip-decompress: true

      - name: Extract build artifacts
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          mapfile -t archives < <(find artifact-download -type f -print)
          if [ "${#archives[@]}" -ne 1 ]; then
            echo "Expected exactly one downloaded artifact archive, found ${#archives[@]}" >&2
            find artifact-download -maxdepth 2 -type f -print >&2
            exit 1
          fi
          unzip -q "${archives[0]}" -d dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
